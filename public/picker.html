<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title></title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1e1e1e;
      color: #e0e0e0;
      padding: 20px;
      user-select: none;
    }
    h2 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .card {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      border: 3px solid transparent;
      background: #2a2a2a;
      transition: border-color 0.15s, transform 0.1s;
    }
    .card:hover {
      border-color: #555;
      transform: scale(1.03);
    }
    .card.selected {
      border-color: #4a9eff;
    }
    .card img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
    }
    .card .label {
      padding: 6px 8px;
      font-size: 11px;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      background: #2a2a2a;
    }
    .card .label-input {
      width: 100%;
      padding: 4px 6px;
      font-size: 11px;
      text-align: center;
      border: 1px solid #4a9eff;
      border-radius: 3px;
      background: #333;
      color: #e0e0e0;
      outline: none;
    }
    .card .remove-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: none;
      background: rgba(0,0,0,0.7);
      color: #ff6b6b;
      font-size: 14px;
      line-height: 20px;
      text-align: center;
      cursor: pointer;
      display: none;
    }
    .card:hover .remove-btn {
      display: block;
    }
    .card .remove-btn:hover {
      background: #ff6b6b;
      color: white;
    }
    .add-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      border: 3px dashed #444;
      background: #2a2a2a;
      cursor: pointer;
      min-height: 160px;
      transition: border-color 0.15s, background 0.15s;
    }
    .add-btn:hover {
      border-color: #4a9eff;
      background: #333;
    }
    .add-btn .icon {
      font-size: 32px;
      color: #666;
      margin-bottom: 6px;
    }
    .add-btn .text {
      font-size: 12px;
      color: #888;
    }
  </style>
</head>
<body>
  <h2 id="samples-title"></h2>
  <div class="grid" id="samples"></div>
  <h2 id="custom-title"></h2>
  <div class="grid" id="custom"></div>

  <script>
    function render(data) {
      const str = data.strings;
      document.getElementById('samples-title').textContent = str.builtInImages;
      document.getElementById('custom-title').textContent = str.myImages;

      const samplesGrid = document.getElementById('samples');
      const customGrid = document.getElementById('custom');

      samplesGrid.innerHTML = '';
      customGrid.innerHTML = '';

      data.images.forEach(img => {
        const isSample = img.key.startsWith('sample:');
        const card = document.createElement('div');
        card.className = 'card' + (img.key === data.selected ? ' selected' : '');
        card.innerHTML = `
          <img src="${img.url}" />
          <div class="label" title="${!isSample ? str.dblClickToRename : ''}">${img.label}</div>
          ${!isSample ? '<button class="remove-btn">&times;</button>' : ''}
        `;
        card.addEventListener('click', (e) => {
          if (e.target.classList.contains('remove-btn') || e.target.classList.contains('label-input')) return;
          window.pickerAPI.selectImage(img.key);
        });
        if (!isSample) {
          const removeBtn = card.querySelector('.remove-btn');
          if (removeBtn) {
            removeBtn.addEventListener('click', (e) => {
              e.stopPropagation();
              window.pickerAPI.removeCustomImage(img.key);
            });
          }
          const labelEl = card.querySelector('.label');
          labelEl.addEventListener('dblclick', (e) => {
            e.stopPropagation();
            const input = document.createElement('input');
            input.className = 'label-input';
            input.value = img.label;
            labelEl.replaceWith(input);
            input.focus();
            input.select();
            function commit() {
              const newName = input.value.trim() || img.label;
              window.pickerAPI.renameCustomImage(img.key, newName);
            }
            input.addEventListener('keydown', (ke) => {
              if (ke.key === 'Enter') { commit(); }
              if (ke.key === 'Escape') { sendPickerUpdate(); }
            });
            input.addEventListener('blur', commit);
          });
        }
        (isSample ? samplesGrid : customGrid).appendChild(card);
      });

      // Add button always at the end of custom grid
      const addBtn = document.createElement('div');
      addBtn.className = 'add-btn';
      addBtn.innerHTML = `<div class="icon">+</div><div class="text">${str.addImage}</div>`;
      addBtn.addEventListener('click', () => window.pickerAPI.addCustomImage());
      customGrid.appendChild(addBtn);
    }

    window.pickerAPI.onImagesUpdated(render);
  </script>
</body>
</html>
