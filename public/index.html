<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>My Back</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: transparent;
            -webkit-app-region: drag;
        }

        .root {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .wrapper {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            max-width: 100%;
            max-height: 100%;
        }

        img {
            max-width: 100%;
            max-height: calc(100vh - 32px);
            object-fit: contain;
            user-select: none;
            display: block;
        }

        .btn-area {
            height: 28px;
            margin-top: 4px;
            flex-shrink: 0;
        }

        button {
            -webkit-app-region: no-drag;
            width: 100%;
            height: 100%;
            padding: 4px 0;
            font-size: 12px;
            border: none;
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            cursor: pointer;
            visibility: hidden;
        }
        button:hover {
            background: rgba(0, 0, 0, 0.9);
        }
    </style>
  </head>
  <body>
    <div class="root">
      <div class="wrapper">
        <img id="poster" />
        <div class="btn-area">
          <button id="ack">확인</button>
        </div>
      </div>
    </div>
    <script>
      const params = new URLSearchParams(window.location.search);
      const image = params.get('image');
      if (image) {
        document.getElementById('poster').src = image;
      }

      document.getElementById('ack').addEventListener('click', () => {
        window.popupAPI.acknowledge();
      });

      window.popupAPI.onShowAck(() => {
        document.getElementById('ack').style.visibility = 'visible';
      });
    </script>
  </body>
</html>
