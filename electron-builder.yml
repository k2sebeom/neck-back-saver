appId: "com.moses97.NeckBackSaver"
productName: "NeckBackSaver"
extends: null

buildVersion: "0.1.0"

extraResources:
  - from: assets/trayicon_light.png
    to: assets/trayicon_light.png
  - from: assets/trayicon_light@2x.png
    to: assets/trayicon_light@2x.png
  - from: assets/trayicon_light@3x.png
    to: assets/trayicon_light@3x.png
  - from: assets/trayicon_dark.png
    to: assets/trayicon_dark.png
  - from: assets/trayicon_dark@2x.png
    to: assets/trayicon_dark@2x.png
  - from: assets/trayicon_dark@3x.png
    to: assets/trayicon_dark@3x.png
  - from: assets/samples/
    to: assets/samples/

directories:
  output: out

publish:
  - provider: github
    releaseType: release

mac:
  identity: null
  target:
    - dmg
  icon: assets/icon.icns

win:
  target:
    - portable
    - nsis
  icon: assets/icon.ico
